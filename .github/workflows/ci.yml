name: ci

# The repository upholds the documented quality commitments (arc42 ch.10) from
# the beginning: every change runs the V&V alongside the Rust quality gates and
# the unit / integration / e2e test tiers.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vv:
    name: V&V (spec conformance V1–V8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: docs
          bundler-cache: true
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Cache doc toolchain
        uses: actions/cache@v4
        with:
          path: |
            docs/tools/structurizr.war
            docs/tools/bin
            docs/tools/cmark-prefix
            docs/tools/pandoc-prefix
          key: doc-tools-${{ hashFiles('docs/tools/checksums.txt', 'docs/scripts/install-tools.sh') }}
      - name: Provision the pinned doc toolchain
        run: docs/scripts/install-tools.sh
      - name: V&V
        run: vv/run.sh

  rust:
    name: Rust quality + tests (unit · integration · e2e)
    runs-on: ubuntu-latest
    # NOTE: once holospaces consumes hologram's private git crates, add a
    # GitHub App token step (actions/create-github-app-token, repositories:
    # hologram) and configure git so Cargo's git-fetch-with-cli can fetch them.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lints (clippy -D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Unit tests
        run: cargo test --workspace --lib --all-features
      - name: Integration tests
        run: cargo test --workspace --test integration --all-features
      - name: E2E tests
        run: cargo test --workspace --test e2e --all-features
