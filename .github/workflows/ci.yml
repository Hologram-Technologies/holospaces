name: ci

# The repository upholds the documented quality commitments (arc42 ch.10) from
# the beginning: every change runs the V&V conformance gates (CS spec
# conformance + CC component conformance) alongside the Rust quality gates and
# the test tiers. Release publishes also run the performance/throughput gate.
#
# holospaces consumes the private hologram substrate as a pinned git dependency
# (ADR-006). Each job configures git with the org-level secret `HOLOGRAM` (a
# token with Contents:read on Hologram-Technologies/hologram) so Cargo's
# git-fetch-with-cli (.cargo/config.toml) can fetch it. The secret is installed
# org-wide (visibility: private), so every private Hologram-Technologies repo
# inherits it — no per-repo setup.

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

jobs:
  vv:
    name: V&V (CS spec conformance V1–V8 + CC component conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure git for the hologram substrate dependency
        env:
          HOLOGRAM_TOKEN: ${{ secrets.HOLOGRAM }}
        run: git config --global url."https://x-access-token:${HOLOGRAM_TOKEN}@github.com/Hologram-Technologies/".insteadOf "https://github.com/Hologram-Technologies/"
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: docs
          bundler-cache: true
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Provision the browser-conformance prerequisites (Playwright + Chromium)
        run: |
          cd crates/holospaces-web/web
          npm install
          # Install Chromium AND chrome-headless-shell with their system deps once
          # (so the per-suite installs are fast no-ops). The browser CC suites
          # (cc17/cc19) then run for real in this job — they do not skip.
          npx --yes playwright install --with-deps chromium chromium-headless-shell
      - name: Cache doc toolchain
        uses: actions/cache@v4
        with:
          path: |
            docs/tools/structurizr.war
            docs/tools/bin
            docs/tools/cmark-prefix
            docs/tools/pandoc-prefix
          key: doc-tools-${{ hashFiles('docs/tools/checksums.txt', 'docs/scripts/install-tools.sh') }}
      - name: Provision the pinned doc toolchain
        run: docs/scripts/install-tools.sh
      - name: Provision the differential oracles (QEMU) + the AArch64 cross toolchain
        # The CC component suites validate the holospaces emulator against QEMU as
        # the differential oracle — qemu-system-riscv64 (CC-9/14/15/16/…),
        # qemu-system-aarch64 + qemu-aarch64 (CC-35/36/37) — and build the CC-35
        # A64 batteries as static `_start` ELFs with the aarch64 cross GCC
        # (`gcc-aarch64-linux-gnu`, which also provides the `as`/`ld`/`objcopy`
        # binutils). Installed WITH recommends (matching a stock workstation: the
        # QEMU firmware/machine data the `virt` boards expect), so every
        # differential runs for real (strict V&V) instead of falling back to the
        # committed pins. Each suite is still SKIP-aware if an oracle is absent.
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            qemu-system-arm qemu-system-misc qemu-user \
            gcc-aarch64-linux-gnu
      - name: V&V (CS + CC, without release performance gate)
        if: github.event_name != 'release'
        env:
          HOLOSPACES_SKIP_PERF: '1'
        run: vv/run.sh
      - name: V&V (CS + CC + release performance gate)
        if: github.event_name == 'release'
        run: vv/run.sh

  rust:
    name: Rust quality + tests (unit · integration · e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for the hologram substrate dependency
        env:
          HOLOGRAM_TOKEN: ${{ secrets.HOLOGRAM }}
        run: git config --global url."https://x-access-token:${HOLOGRAM_TOKEN}@github.com/Hologram-Technologies/".insteadOf "https://github.com/Hologram-Technologies/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lints (clippy -D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Docs (no broken links; every public item documented)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Unit tests
        run: cargo test --workspace --lib --all-features
      - name: Integration tests
        run: cargo test --workspace --test integration --all-features
      - name: E2E tests
        run: cargo test --workspace --test e2e --all-features
      - name: Portability — the peer builds for browser + bare-metal (ch.7 / Q6)
        run: |
          cargo build -p holospaces --target wasm32-unknown-unknown
          cargo build -p holospaces --no-default-features --target thumbv7em-none-eabi

  browser:
    name: Browser peer + Platform Manager (Chromium/Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git for the hologram substrate dependency
        env:
          HOLOGRAM_TOKEN: ${{ secrets.HOLOGRAM }}
        run: git config --global url."https://x-access-token:${HOLOGRAM_TOKEN}@github.com/Hologram-Technologies/".insteadOf "https://github.com/Hologram-Technologies/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/holospaces-web
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright Chromium
        run: |
          cd crates/holospaces-web/web
          npm install
          # Install the headed Chromium AND chrome-headless-shell — Playwright's
          # default headless mode (chromium.launch()) runs chrome-headless-shell,
          # a separate download from chromium; omitting it makes launch() fail
          # with "Executable doesn't exist …/chrome-headless-shell".
          npx --yes playwright install --with-deps chromium chromium-headless-shell
      - name: Run the Platform Manager browser test
        run: scripts/browser-manager-test.sh
