name: ci

# The repository upholds the documented quality commitments (arc42 ch.10) from
# the beginning: every change runs the V&V (CS spec conformance + CC component
# conformance) alongside the Rust quality gates and the test tiers.
#
# holospaces consumes the private hologram substrate as a pinned git dependency
# (ADR-006). Both jobs mint a GitHub App token scoped to
# Hologram-Technologies/hologram and configure git so Cargo's git-fetch-with-cli
# (.cargo/config.toml) can fetch it. Required repository secrets:
#   HOLOGRAM_APP_ID, HOLOGRAM_APP_PRIVATE_KEY
# (a GitHub App installed on the hologram repo with Contents: read).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vv:
    name: V&V (CS spec conformance V1–V8 + CC component conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Mint hologram access token
        uses: actions/create-github-app-token@v1
        id: hologram-token
        with:
          app-id: ${{ secrets.HOLOGRAM_APP_ID }}
          private-key: ${{ secrets.HOLOGRAM_APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram
      - name: Configure git for the hologram substrate dependency
        run: git config --global url."https://x-access-token:${{ steps.hologram-token.outputs.token }}@github.com/Hologram-Technologies/".insteadOf "https://github.com/Hologram-Technologies/"
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: docs
          bundler-cache: true
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache doc toolchain
        uses: actions/cache@v4
        with:
          path: |
            docs/tools/structurizr.war
            docs/tools/bin
            docs/tools/cmark-prefix
            docs/tools/pandoc-prefix
          key: doc-tools-${{ hashFiles('docs/tools/checksums.txt', 'docs/scripts/install-tools.sh') }}
      - name: Provision the pinned doc toolchain
        run: docs/scripts/install-tools.sh
      - name: V&V (CS-1..CS-6 + CC-1..CC-5)
        run: vv/run.sh

  rust:
    name: Rust quality + tests (unit · integration · e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mint hologram access token
        uses: actions/create-github-app-token@v1
        id: hologram-token
        with:
          app-id: ${{ secrets.HOLOGRAM_APP_ID }}
          private-key: ${{ secrets.HOLOGRAM_APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram
      - name: Configure git for the hologram substrate dependency
        run: git config --global url."https://x-access-token:${{ steps.hologram-token.outputs.token }}@github.com/Hologram-Technologies/".insteadOf "https://github.com/Hologram-Technologies/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lints (clippy -D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Docs (no broken links; every public item documented)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Unit tests
        run: cargo test --workspace --lib --all-features
      - name: Integration tests
        run: cargo test --workspace --test integration --all-features
      - name: E2E tests
        run: cargo test --workspace --test e2e --all-features
      - name: Portability — the peer builds for browser + bare-metal (ch.7 / Q6)
        run: |
          cargo build -p holospaces --target wasm32-unknown-unknown
          cargo build -p holospaces --no-default-features --target thumbv7em-none-eabi
