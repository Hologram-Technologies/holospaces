name: docs

# Documentation V&V gate: provisions the pinned toolchain and runs the full
# author → validate (V1–V8) → render → idempotence pipeline in docs/.

on:
  push:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: docs
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Provision the pinned doc toolchain
        run: scripts/install-tools.sh

      - name: Build + validate docs (V1–V8 · render · idempotence)
        run: scripts/build.sh
