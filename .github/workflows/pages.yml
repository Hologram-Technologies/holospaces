name: pages

# Deploy the Hologram Platform Manager (holospaces' browser peer) to GitHub
# Pages — the cold-start, content-addressed delivery of the operator console
# (arc42 ch.3 / ch.5 / ch.6: "served from GitHub Pages", an untrusted gateway;
# every byte is verified by re-derivation on load, Law L5).
#
# Production is served from the `gh-pages` branch **root** (Settings → Pages →
# Source: Deploy from a branch → gh-pages /(root)). Per-PR previews live in
# isolated `pr-preview/pr-<N>/` subfolders on the same branch (pages-preview.yml),
# so a PR is never deployed to the production site — `clean-exclude: pr-preview`
# below keeps the previews intact across production deploys. The build itself is
# shared with the preview via the `build-site` composite action, so both build
# byte-identically.
#
# Requires the org-level `HOLOGRAM` token (Contents:read on
# Hologram-Technologies/hologram) to build the wasm bundle.

on:
  push:
    branches: [main]
    paths:
      - 'crates/holospaces-web/**'
      - 'vv/artifacts/cc11/**'
      - 'vv/artifacts/cc9/linux/**'
      - 'vv/artifacts/cc13/**'
      - '.github/workflows/pages.yml'
      - '.github/actions/build-site/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://hologram-technologies.github.io/holospaces/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Platform Manager site
        uses: ./.github/actions/build-site
        with:
          hologram-token: ${{ secrets.HOLOGRAM }}
      - name: Deploy to the gh-pages root (production)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          # Never wipe the per-PR preview deployments living alongside production.
          clean-exclude: |
            pr-preview/**
          commit-message: "deploy: Platform Manager → gh-pages root (${{ github.sha }})"
