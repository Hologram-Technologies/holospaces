name: vv

# Verification & Validation gate. Provisions the pinned toolchain and runs the
# authoritative V&V entry point (vv/run.sh): CS-* specification conformance
# (the documentation validated against arc42 / OPM ISO 19450 / ISO 15288 /
# CommonMark-GFM / Structurizr, via V1–V8), render, and idempotence.

on:
  push:
    paths:
      - 'docs/**'
      - 'vv/**'
      - 'AGENTS.md'
      - 'Justfile'
      - '.github/workflows/vv.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'vv/**'
      - 'AGENTS.md'
      - 'Justfile'
      - '.github/workflows/vv.yml'

jobs:
  vv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Ruby 3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: docs
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Provision the pinned doc toolchain
        run: docs/scripts/install-tools.sh

      - name: V&V (vv/run.sh)
        run: vv/run.sh
