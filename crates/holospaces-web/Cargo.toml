[package]
name = "holospaces-web"
description = "The Hologram Platform Manager — holospaces' browser peer (wasm32), served from GitHub Pages"
version = "0.0.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/Hologram-Technologies/holospaces"

# wasm32-only (web-sys / wasm-bindgen). Excluded from the host workspace; built
# explicitly via `scripts/browser-manager-test.sh` and the Pages deploy.
[lib]
crate-type = ["cdylib"]

[dependencies]
holospaces = { path = "../holospaces" }
hologram-store-mem = { git = "https://github.com/Hologram-Technologies/hologram", rev = "18f553d8578997ce32e7b653786a0bcf9b09a2c0", package = "hologram-store-mem" }
hologram-substrate-core = { git = "https://github.com/Hologram-Technologies/hologram", rev = "18f553d8578997ce32e7b653786a0bcf9b09a2c0", package = "hologram-substrate-core" }
wasm-bindgen = "0.2"
serde_json = "1"

[profile.release]
opt-level = "s"
