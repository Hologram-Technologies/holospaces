<!doctype html><meta charset=utf8><title>booting-sm</title><pre id=t style="color:#cfe;background:#07070c;padding:10px;white-space:pre-wrap;font:12px monospace"></pre>
<script type=module>
const t=document.getElementById('t');const w=new Worker('./x64sm-worker.mjs',{type:'module'});
w.onmessage=e=>{const d=e.data;window.__last=d;if(d.ok!==undefined){window.__bootResult=d;document.title=d.ok?'BOOT-DONE':'BOOT-FAIL';t.textContent=JSON.stringify(d,null,1);}else{t.textContent='stage: '+(d.stage||'')+(d.i!==undefined?' i='+d.i+' mounted='+d.mounted+' user='+d.userspace+'\n'+(d.tail||''):'');}};
w.onerror=e=>{window.__bootResult={ok:false,error:e.message||(e.filename+':'+e.lineno)};document.title='BOOT-FAIL';};
w.postMessage('go');
</script>
