<!doctype html>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>x86-64 Alpine — boot once, RESUME instantly (framebuffer intact)</title>
<style>
  html,body{margin:0;height:100%;background:#05080d;color:#cfe0f5;font-family:ui-monospace,Menlo,Consolas,monospace}
  #wrap{display:flex;flex-direction:column;height:100%}
  #hud{padding:8px 12px;font-size:12.5px;line-height:1.6;background:#070b12;border-bottom:1px solid #16202e}
  #hud b{color:#7fd1b9} .ok{color:#7fe0a3} .bad{color:#ff8a8a} .k{color:#8a93a6}
  #main{flex:1;min-height:0;display:flex}
  #stage{position:relative;flex:1;min-height:0;background:#000}
  #out{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:contain}
  #serial{width:40%;max-width:560px;margin:0;padding:8px 10px;overflow:auto;white-space:pre-wrap;font-size:11px;color:#9fb0c8;background:#04060a;border-left:1px solid #16202e}
</style>
<div id="wrap">
  <div id="hud">
    <div>boot real Alpine x86-64 to a framebuffer ONCE, <b>suspend</b> the running machine to a κ-snapshot, then <b>resume</b> it — the canvas below shows the framebuffer <b>restored from the snapshot</b>, in a fraction of the boot time.</div>
    <div id="phase" class="k">starting worker …</div>
    <div id="timing" class="k">— </div>
    <div id="verdict" class="k"></div>
  </div>
  <div id="main">
    <div id="stage"><canvas id="out"></canvas></div>
    <pre id="serial">(serial console — post-resume)</pre>
  </div>
</div>
<script type="module">
const $ = id => document.getElementById(id);
function xrgbToRgba(buf){ const s=new Uint8Array(buf),o=new Uint8ClampedArray(s.length); for(let i=0;i<s.length;i+=4){o[i]=s[i+2];o[i+1]=s[i+1];o[i+2]=s[i];o[i+3]=255;} return o; }
function render(buf,W,H){ const c=$("out"); if(c.width!==W){c.width=W;c.height=H;} c.getContext("2d").putImageData(new ImageData(xrgbToRgba(buf),W,H),0,0); }
const w = new Worker("./fb-resume-x64-boot-worker.mjs", { type: "module" });
window.__res = { phase: "starting" }; window.__hb = 0; setInterval(()=>window.__hb++,1000);
w.onerror = (e)=>{ const m=`worker.onerror: ${e.message} @ ${e.filename}:${e.lineno}`; console.error(m); window.__res.workerError=m; $("verdict").className="bad"; $("verdict").textContent=m; };
w.onmessage = (e)=>{
  const m = e.data; window.__res = { ...window.__res, ...m, fb: undefined };
  $("phase").textContent = (m.done?"✓ ":"· ") + (m.phase||"");
  if (m.tBootSec!=null) $("timing").innerHTML =
    `cold boot <b>${m.tBootSec}s</b>` + (m.tSuspendSec!=null?` · suspend <b>${m.tSuspendSec}s</b>`:"") +
    (m.tResumeMs!=null?` · <b class="ok">resume ${m.tResumeMs}ms</b> · <b class="ok">${m.speedup}× faster</b>`:"") +
    (m.snapBytes!=null?` · snapshot ${(m.snapBytes/1048576).toFixed(1)}MB`:"");
  if (m.serialTail) $("serial").textContent = m.serialTail;
  if (m.fb) { try{ render(m.fb,m.W,m.H); }catch(err){ console.error(err); } }
  if (m.done) {
    $("verdict").className = m.pass ? "ok" : "bad";
    $("verdict").textContent = m.pass
      ? `RESUME PASS — framebuffer restored pixel-for-pixel (${m.pixPost.toLocaleString()} px, hash match) and the machine is LIVE, in ${m.tResumeMs}ms vs a ${m.tBootSec}s cold boot (${m.speedup}× faster). Boot once, reopen instantly.`
      : `incomplete — fbRestored=${m.fbRestored} (pre ${m.pixPre}/${(m.hashPre||0).toString(16)} vs post ${m.pixPost}/${(m.hashPost||0).toString(16)}) live=${m.live} liveErr=${m.liveErr||'-'} halt=${m.haltReason||'-'}`;
    window.__res.pass = m.pass;
  }
  if (m.phase==="error"){ $("verdict").className="bad"; $("verdict").textContent="ERROR: "+m.error; }
};
w.postMessage({ go:true, nonce:(crypto.randomUUID?crypto.randomUUID():String(Date.now())) });
</script>
