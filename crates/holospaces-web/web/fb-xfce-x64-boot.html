<!doctype html>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>XFCE on x86-64 Alpine — real desktop → framebuffer → κ render</title>
<style>
  html,body{margin:0;height:100%;background:#05080d;color:#cfe0f5;font-family:ui-monospace,Menlo,Consolas,monospace}
  #wrap{display:flex;flex-direction:column;height:100%}
  #hud{padding:8px 12px;font-size:12.5px;line-height:1.6;background:#070b12;border-bottom:1px solid #16202e}
  #hud b{color:#7fd1b9} .ok{color:#7fe0a3} .bad{color:#ff8a8a} .k{color:#8a93a6}
  #main{flex:1;min-height:0;display:flex}
  #stage{position:relative;flex:1;min-height:0;background:#000}
  #out{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:contain}
  #serial{width:40%;max-width:560px;margin:0;padding:8px 10px;overflow:auto;white-space:pre-wrap;font-size:11px;color:#9fb0c8;background:#04060a;border-left:1px solid #16202e}
</style>
<div id="wrap">
  <div id="hud">
    <div>the <b>real Alpine x86-64</b> kernel boots a <b>full XFCE 4 desktop</b> (Xorg on the simpledrm framebuffer) over a κ-disk; the X server's pixels render onto the emulator's linear framebuffer → κ super-res.</div>
    <div id="phase" class="k">starting worker …</div>
    <div id="signals" class="k">— </div>
    <div id="verdict" class="k"></div>
  </div>
  <div id="main">
    <div id="stage"><canvas id="out"></canvas></div>
    <pre id="serial">(serial console)</pre>
  </div>
</div>
<script type="module">
const $ = id => document.getElementById(id);
// Guest framebuffer is XRGB8888 (bytes [B,G,R,X]) → canvas RGBA.
function xrgbToRgba(buf) {
  const src = new Uint8Array(buf), out = new Uint8ClampedArray(src.length);
  for (let i = 0; i < src.length; i += 4) { out[i]=src[i+2]; out[i+1]=src[i+1]; out[i+2]=src[i]; out[i+3]=255; }
  return out;
}
function render(buf, W, H) {
  const out = $("out");
  if (out.width !== W) { out.width = W; out.height = H; }
  out.getContext("2d").putImageData(new ImageData(xrgbToRgba(buf), W, H), 0, 0);
}
const w = new Worker("./fb-xfce-x64-boot-worker.mjs", { type: "module" });
window.__xfce = { phase: "starting" };
window.__hb = 0; setInterval(() => window.__hb++, 1000);

// ── Interactivity: forward keyboard + mouse to the guest's virtio-input device ──
// KeyboardEvent.code → Linux evdev KEY_* code (the subset a desktop needs).
const KEYMAP = {
  Escape:1,Digit1:2,Digit2:3,Digit3:4,Digit4:5,Digit5:6,Digit6:7,Digit7:8,Digit8:9,Digit9:10,Digit0:11,
  Minus:12,Equal:13,Backspace:14,Tab:15,KeyQ:16,KeyW:17,KeyE:18,KeyR:19,KeyT:20,KeyY:21,KeyU:22,KeyI:23,
  KeyO:24,KeyP:25,BracketLeft:26,BracketRight:27,Enter:28,ControlLeft:29,KeyA:30,KeyS:31,KeyD:32,KeyF:33,
  KeyG:34,KeyH:35,KeyJ:36,KeyK:37,KeyL:38,Semicolon:39,Quote:40,Backquote:41,ShiftLeft:42,Backslash:43,
  KeyZ:44,KeyX:45,KeyC:46,KeyV:47,KeyB:48,KeyN:49,KeyM:50,Comma:51,Period:52,Slash:53,ShiftRight:54,
  NumpadMultiply:55,AltLeft:56,Space:57,CapsLock:58,F1:59,F2:60,F3:61,F4:62,F5:63,F6:64,F7:65,F8:66,
  F9:67,F10:68,NumLock:69,ScrollLock:70,F11:87,F12:88,ControlRight:97,AltRight:100,Home:102,ArrowUp:103,
  PageUp:104,ArrowLeft:105,ArrowRight:106,End:107,ArrowDown:108,PageDown:109,Insert:110,Delete:111,
};
const sendInput = (input) => w.postMessage({ input });
const canvas = $("out");
canvas.tabIndex = 0; // focusable so it receives key events
canvas.addEventListener("mousedown", () => canvas.focus());
addEventListener("keydown", (e) => { const c = KEYMAP[e.code]; if (c != null) { e.preventDefault(); sendInput({ kind: "key", code: c, down: true }); } });
addEventListener("keyup",   (e) => { const c = KEYMAP[e.code]; if (c != null) { e.preventDefault(); sendInput({ kind: "key", code: c, down: false }); } });
canvas.addEventListener("mousemove", (e) => {
  // Scale CSS-pixel movement → guest pixels (canvas is object-fit:contain). movementX/Y are relative.
  const r = canvas.getBoundingClientRect();
  const sx = r.width ? (canvas.width / r.width) : 1, sy = r.height ? (canvas.height / r.height) : 1;
  const dx = Math.round((e.movementX || 0) * sx), dy = Math.round((e.movementY || 0) * sy);
  if (dx || dy) sendInput({ kind: "motion", dx, dy });
});
canvas.addEventListener("mousedown", (e) => { e.preventDefault(); sendInput({ kind: "button", button: e.button, down: true }); });
addEventListener("mouseup", (e) => sendInput({ kind: "button", button: e.button, down: false }));
canvas.addEventListener("contextmenu", (e) => e.preventDefault());
canvas.addEventListener("wheel", (e) => { e.preventDefault(); sendInput({ kind: "wheel", clicks: e.deltaY < 0 ? 1 : -1 }); }, { passive: false });
w.onerror = (e) => { const m = `worker.onerror: ${e.message} @ ${e.filename}:${e.lineno}`; console.error(m); window.__xfce.workerError = m; $("verdict").className="bad"; $("verdict").textContent=m; };
w.onmessage = (e) => {
  const m = e.data;
  window.__xfce = { ...window.__xfce, ...m, fb: undefined };
  $("phase").textContent = (m.done ? "✓ " : "· ") + (m.phase || "");
  if (m.iter != null) $("signals").innerHTML =
    `iter <b>${m.iter}</b> · fbcon <b class="${m.fbcon?'ok':'k'}">${m.fbcon?'y':'…'}</b>` +
    ` · root <b class="${m.mounted?'ok':'k'}">${m.mounted?'y':'…'}</b>` +
    ` · init <b class="${m.initRan?'ok':'k'}">${m.initRan?'y':'…'}</b>` +
    ` · Xorg <b class="${m.xorg?'ok':'k'}">${m.xorg?'y':'…'}</b>` +
    ` · XFCE <b class="${m.xfce?'ok':'k'}">${m.xfce?'y':'…'}</b>` +
    ` · px <b>${(m.pixels||0).toLocaleString()}</b> · ${m.W}×${m.H}`;
  if (m.serialTail) $("serial").textContent = m.serialTail;
  if (m.fb) { try { render(m.fb, m.W, m.H); } catch (err) { console.error(err); } }
  if (m.done) {
    const pass = m.xfce && (m.pixels||0) > 5000;
    $("verdict").className = pass ? "ok" : "bad";
    $("verdict").textContent = pass
      ? `XFCE PASS — real Alpine x86-64 booted a full XFCE desktop; ${(m.pixels||0).toLocaleString()} live pixels rendered through κ. mips=${m.mips} ${m.elapsedSec}s`
      : `incomplete — fbcon=${m.fbcon} root=${m.mounted} init=${m.initRan} xorg=${m.xorg} xfce=${m.xfce} px=${m.pixels} halt=${m.haltReason||'-'}`;
    window.__xfce.pass = pass;
  }
  if (m.phase === "error") { $("verdict").className="bad"; $("verdict").textContent="ERROR: "+m.error; }
};
(async () => {
  // This page shares OPFS with prior runs on the same origin (localhost:8099). Stale
  // multi-hundred-MB disk/pack files exhaust the quota and STALL the assembly's OPFS writes —
  // free everything before starting so each run has a clean slate + headroom.
  try {
    const root = await navigator.storage.getDirectory();
    const names = []; for await (const [n] of root.entries()) names.push(n);
    for (const n of names) { try { await root.removeEntry(n, { recursive: true }); } catch (e) {} }
    $("phase").textContent = "· cleared " + names.length + " stale OPFS entries — starting (assembly is synchronous, ~30–90s with a static HUD, then ctor + pixels)";
  } catch (e) { console.error("opfs clear", e); }
  const coldboot = new URLSearchParams(location.search).has("coldboot");
  w.postMessage({ go: true, coldboot, nonce: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())) });
})();
</script>
