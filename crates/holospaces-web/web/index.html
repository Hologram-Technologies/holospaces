<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hologram Platform Manager</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 52rem; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.3rem; }
      button { font: inherit; padding: 0.3rem 0.7rem; margin-right: 0.4rem; }
      code, pre { font-family: ui-monospace, monospace; }
      .k { color: #555; word-break: break-all; }
      #holospaces li { margin: 0.2rem 0; }
      .muted { color: #777; }
    </style>
  </head>
  <body>
    <h1>Hologram Platform Manager</h1>
    <p class="muted">
      The browser is a peer that <em>is</em> the substrate — no server (Law L1).
      Identity is content; every byte is verified by re-derivation (Law L5).
    </p>
    <p>
      <button id="signin">Sign in</button>
      <button id="provision">Provision a .holo</button>
      <button id="userland">Provision a userland</button>
      <button id="boot">Boot a userland</button>
      <button id="devcontainer">Run a devcontainer</button>
      <button id="runholo">Run a .holo</button>
    </p>
    <p>operator: <span id="operator" class="k muted">(signed out)</span></p>
    <p>holospaces:</p>
    <ul id="holospaces"><li class="muted">none yet</li></ul>
    <p>roster κ: <span id="roster" class="k muted">—</span></p>
    <pre id="log" class="muted">loading…</pre>

    <script type="module">
      import init, { kappa, verify_kappa, run_holo, validate_userland, Console }
        from "./pkg/holospaces_web.js";
      await init();

      // Expose the Manager surface for the Playwright browser test.
      window.hs = { kappa, verify_kappa, run_holo, validate_userland, Console };

      const console0 = new Console();
      const $ = (id) => document.getElementById(id);
      const log = (m) => ($("log").textContent = m);
      let n = 0;

      function render() {
        const v = JSON.parse(console0.view());
        $("operator").textContent = v.operator || "(signed out)";
        $("holospaces").innerHTML =
          v.holospaces.length === 0
            ? '<li class="muted">none yet</li>'
            : v.holospaces.map((k) => `<li class="k">${k}</li>`).join("");
        $("roster").textContent = console0.roster_kappa() || "—";
      }

      $("signin").onclick = () => {
        const id = console0.sign_in(new TextEncoder().encode("operator-self-sovereign-key"));
        log("signed in — identity " + id);
        render();
      };
      $("provision").onclick = () => {
        const code = new TextEncoder().encode("holospace code module #" + ++n);
        const k = console0.provision(code, 256 * 1024 * 1024);
        log("provisioned a .holo holospace " + k);
        render();
      };
      // The execution surface (ADR-008): validate a recompiled userland against
      // the host-ABI surface, then provision it as a holospace — in-browser.
      $("userland").onclick = async () => {
        try {
          const res = await fetch("./fixture-userland.wasm");
          const module = new Uint8Array(await res.arrayBuffer());
          const k = console0.provision_userland(module, 4 * 1024 * 1024);
          log("provisioned a userland holospace (execution surface) " + k);
          render();
        } catch (e) {
          log("userland provisioning failed: " + e);
        }
      };
      // Boot a userland container in the browser (ADR-008; RT2; CC-6): spawn it
      // through the substrate runtime over the wasmi interpreter engine, capture
      // a κ snapshot of its state, resume, terminate — all in the browser peer.
      $("boot").onclick = async () => {
        try {
          const res = await fetch("./fixture-userland.wasm");
          const module = new Uint8Array(await res.arrayBuffer());
          const snapshot = console0.boot_userland(module, 4 * 1024 * 1024);
          log("booted a userland in-browser → state snapshot κ " + snapshot);
          render();
        } catch (e) {
          log("booting the userland failed: " + e);
        }
      };
      // The Codespaces scenario (arc42 ch.1): import a devcontainer and run it
      // in the browser tab — no Docker daemon, no cloud VM. The config selects a
      // κ-addressed Wasm userland (here the fixture), booted on the wasmi engine.
      $("devcontainer").onclick = async () => {
        try {
          const res = await fetch("./fixture-userland.wasm");
          const userland = new Uint8Array(await res.arrayBuffer());
          const config = new TextEncoder().encode('{"name":"app","image":"debian:12"}');
          const snapshot = console0.run_devcontainer(
            "https://github.com/example/cool-project.git",
            "main",
            ".devcontainer/devcontainer.json",
            config,
            userland,
            64 * 1024 * 1024,
          );
          log("ran a devcontainer in-browser → state snapshot κ " + snapshot);
          render();
        } catch (e) {
          log("running the devcontainer failed: " + e);
        }
      };
      // The browser .holo engine (RT2, realized): run a .holo through the
      // executor compiled to wasm; the output κ equals the native one (CC-2).
      $("runholo").onclick = async () => {
        try {
          const res = await fetch("./fixture.holo");
          const archive = new Uint8Array(await res.arrayBuffer());
          log("browser .holo engine → output κ " + run_holo(archive));
        } catch (e) {
          log("running the .holo failed: " + e);
        }
      };

      window.__ready = true;
      log("ready — sign in, then provision holospaces (both compute forms, in-browser)");
    </script>
  </body>
</html>
