<!doctype html><meta charset=utf8><title>resume-stream</title><pre id=t style="color:#cfe;background:#07070c;padding:10px;white-space:pre-wrap;font:12px monospace"></pre>
<script type=module>
const t=document.getElementById('t');const w=new Worker('./x64-stream-worker.mjs',{type:'module'});
w.onmessage=e=>{const d=e.data;window.__last=d;
  if(d.ok!==undefined){window.__result=d;document.title=d.ok?'STREAM-DONE':'STREAM-FAIL';t.textContent=JSON.stringify(d,null,1);}
  else{t.textContent='stage: '+(d.stage||'')+(d.fetched!==undefined?(' '+d.fetched+'/'+d.total+' pages'):'')+'\n'+(d.tail||'');}};
w.onerror=e=>{window.__result={ok:false,error:e.message||(e.filename+':'+e.lineno)};document.title='STREAM-FAIL';};
w.postMessage('go');
</script>
